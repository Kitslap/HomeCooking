# ─────────────────────────────────────────────────────────────────────────────
# nginx.conf — Home Cooking Frontend
#
# Rôles :
#   1. Servir les fichiers statiques React (SPA — fallback index.html)
#   2. Proxifier /api/* vers le container backend (évite les problèmes CORS)
#   3. En-têtes de sécurité HTTP
#   4. Compression gzip des assets
# ─────────────────────────────────────────────────────────────────────────────

server {
    listen       80;
    server_name  _;

    root  /usr/share/nginx/html;
    index index.html;

    # ── Compression ──────────────────────────────────────────────────────────
    gzip            on;
    gzip_vary       on;
    gzip_min_length 1024;
    gzip_proxied    any;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/x-javascript
        image/svg+xml
        font/woff
        font/woff2;

    # ── En-têtes de sécurité ─────────────────────────────────────────────────
    add_header X-Content-Type-Options    "nosniff"                    always;
    add_header X-Frame-Options           "DENY"                       always;
    add_header X-XSS-Protection          "0"                          always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "geolocation=(), microphone=(), camera=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ── Cache des assets statiques (Vite génère des noms avec hash) ──────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires     1y;
        add_header  Cache-Control "public, immutable";
        access_log  off;
    }

    # ── Proxy vers le backend Go ─────────────────────────────────────────────
    # Toutes les requêtes /api/* et /health sont redirigées vers le backend.
    # Le nom "backend" est résolu par le réseau Docker interne (docker-compose).
    location /api/ {
        proxy_pass         http://backend:8080;
        proxy_http_version 1.1;

        # En-têtes standard de reverse proxy
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Supprime l'Origin avant de proxifier vers le backend.
        # Le backend est sur un réseau Docker interne — nginx est la seule
        # frontière de sécurité, le CORS côté backend est inutile ici.
        proxy_set_header   Origin            "";

        # Timeouts adaptés aux opérations bcrypt (~250ms)
        proxy_connect_timeout 5s;
        proxy_send_timeout    30s;
        proxy_read_timeout    30s;

        # Pas de buffer pour les réponses JSON (streaming futur)
        proxy_buffering    off;
    }

    # Healthcheck backend proxifié
    location /health {
        proxy_pass http://backend:8080/health;
    }

    # Healthcheck frontend (pour le HEALTHCHECK Docker)
    location /health-frontend {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # ── SPA fallback — DOIT être en dernier ─────────────────────────────────
    # Toute URL inconnue retourne index.html pour que React Router gère le routing
    location / {
        try_files $uri $uri/ /index.html;

        # Pas de cache sur index.html (entry point de la SPA)
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # ── Sécurité — bloquer l'accès aux fichiers cachés ───────────────────────
    location ~ /\. {
        deny all;
        return 404;
    }
}
